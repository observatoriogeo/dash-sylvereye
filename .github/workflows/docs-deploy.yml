name: Deploy docs

# Builds the Docusaurus site under website/ and publishes it to GitHub
# Pages on every push to main. Pages must be enabled in repo Settings
# with "Build and deployment / Source: GitHub Actions" (no gh-pages
# branch is used; the artifact is deployed directly).
#
# Custom domain: website/static/CNAME pins the site to
# dashsylvereye.observatoriogeo.mx. Pages serves the CNAME file at the
# site root, which GitHub picks up to register the custom domain on
# first deploy. The DNS record (CNAME dashsylvereye.observatoriogeo.mx
# -> observatoriogeo.github.io) must exist on the observatoriogeo.mx
# zone before HTTPS provisioning succeeds.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

# Permissions needed for the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; never cancel an in-flight deploy.
# (Cancelling mid-deploy can leave the site in a broken state.)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build site
        run: npm run build
        working-directory: website

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
